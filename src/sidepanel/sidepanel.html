<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotations Side Panel</title>
    <link rel="stylesheet" href="../ui.css">
    <style>
        body {
            /* Side panel specific layout */
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            background-color: var(--bg);
        }

        header {
            padding: var(--space-4);
            border-bottom: 1px solid var(--border);
            background-color: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .header-actions button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            padding: 0;
        }

        .header-actions button:hover {
            background-color: var(--ghost-hover-bg);
            color: var(--text);
        }

        .header-actions button.active {
            color: var(--primary);
            background-color: var(--ghost-hover-bg);
        }

        h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
        }

        #annotationList {
            flex: 1;
            padding: var(--space-4);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        footer {
            padding: var(--space-4);
            border-top: 1px solid var(--border);
            background-color: var(--surface);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        /* Card annotation styles */
        .card .card-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-bottom: var(--space-2);
            margin-bottom: var(--space-2);
            border-bottom: 1px solid var(--border);
            min-width: 0;
        }

        .card .card-header .code-badge {
            flex-shrink: 0;
        }

        .card .card-header .inner-content {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card .card-header .card-index {
            flex-shrink: 0;
        }

        .card .card-feedback {
            font-size: 0.875rem;
            color: var(--text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        /* Drag & drop */
        .card[draggable="true"] {
            cursor: grab;
        }

        .card[draggable="true"]:active {
            cursor: grabbing;
        }

        .card.dragging {
            opacity: 0.4;
            transform: scale(0.97);
        }

        .card.drag-over {
            border-top: 2px solid var(--primary);
        }

        /* Toast override for sidepanel context */
        #toast {
            width: fit-content;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <header>
        <h2>Annotations</h2>
        <div class="header-actions">
            <button id="toggleInspectBtn" title="Toggle Inspect Mode">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="22" x2="18" y1="12" y2="12" />
                    <line x1="6" x2="2" y1="12" y2="12" />
                    <line x1="12" x2="12" y1="6" y2="2" />
                    <line x1="12" x2="12" y1="22" y2="18" />
                </svg>
            </button>
            <button id="closePanelBtn" title="Close Side Panel">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
    </header>

    <div id="annotationList">
        <!-- JS injects cards here -->
    </div>

    <footer>
        <button id="exportBtn" class="btn btn-primary">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
            Copy Prompt
        </button>
        <button id="clearBtn" class="btn btn-ghost hover:bg-red-50 hover:text-red-600" style="color: var(--danger);">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M3 6h18" />
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
            Clear All
        </button>
    </footer>

    <div id="toast" class="toast">Copy successful</div>
    <script src="sidepanel.js"></script>
</body>

</html>
