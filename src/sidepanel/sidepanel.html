<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annotations Side Panel</title>
    <link rel="stylesheet" href="../ui.css">
    <style>
        body {
            /* Side panel specific layout */
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
            background-color: var(--bg);
        }

        header {
            padding: var(--space-4);
            border-bottom: 1px solid var(--border);
            background-color: var(--surface);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        .header-actions button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: var(--radius);
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            padding: 0;
        }

        .header-actions button:hover {
            background-color: var(--ghost-hover-bg);
            color: var(--text);
        }

        .header-actions button.active {
            color: var(--primary);
            background-color: var(--ghost-hover-bg);
        }

        h2 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin: 0;
        }

        #annotationList {
            flex: 1;
            padding: var(--space-4);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        footer {
            padding: var(--space-4);
            border-top: 1px solid var(--border);
            background-color: var(--surface);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }

        /* Card annotation styles */
        .card .card-header {
            display: flex;
            align-items: center;
            gap: 6px;
            padding-bottom: var(--space-2);
            margin-bottom: var(--space-2);
            border-bottom: 1px solid var(--border);
            min-width: 0;
        }

        .card .card-header .code-badge {
            flex-shrink: 0;
        }

        .card .card-header .inner-content {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .card .card-header .card-index {
            flex-shrink: 0;
        }

        .card .card-feedback {
            font-size: 0.875rem;
            color: var(--text);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }

        /* Network annotation cards */
        .card.card-network {
            border-left: 3px solid #3b82f6;
        }

        .card-network .card-header .method-badge {
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            padding: 1px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .card-network .card-header .method-badge.get { background: #22c55e; }
        .card-network .card-header .method-badge.post { background: #3b82f6; }
        .card-network .card-header .method-badge.put,
        .card-network .card-header .method-badge.patch { background: #f59e0b; }
        .card-network .card-header .method-badge.delete { background: #ef4444; }
        .card-network .card-header .method-badge.options { background: #8b5cf6; }

        .card-network .req-url {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .card-network .req-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .card-network .req-meta .status-ok { color: #22c55e; font-weight: 600; }
        .card-network .req-meta .status-err { color: #ef4444; font-weight: 600; }
        .card-network .req-meta .status-warn { color: #f59e0b; font-weight: 600; }

        /* Drag & drop */
        .card[draggable="true"] {
            cursor: grab;
        }

        .card[draggable="true"]:active {
            cursor: grabbing;
        }

        .card.dragging {
            opacity: 0.4;
            transform: scale(0.97);
        }

        .card.drag-over {
            border-top: 2px solid var(--primary);
        }

        /* Context area – edit mode (textarea) */
        .context-area {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.15s ease;
            opacity: 0;
            padding: 0 var(--space-4);
            background-color: var(--surface);
            border-bottom: 1px solid transparent;
        }

        .context-area.open {
            max-height: 200px;
            opacity: 1;
            padding: var(--space-3) var(--space-4);
            border-bottom-color: var(--border);
        }

        .context-area textarea {
            width: 100%;
            min-height: 60px;
            max-height: 100px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.8rem;
            padding: var(--space-2);
            outline: none;
            transition: border-color 0.15s ease;
            box-sizing: border-box;
        }

        .context-area textarea:focus {
            border-color: var(--primary);
        }

        .context-area textarea::placeholder {
            color: var(--text-muted);
        }

        .context-area .context-edit-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: var(--space-2);
        }

        .context-area .context-edit-actions button {
            font-size: 0.75rem;
            padding: 3px 12px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            font-weight: 500;
            transition: opacity 0.15s ease;
        }

        .context-area .context-edit-actions button:hover {
            opacity: 0.85;
        }

        /* Context display – saved paragraph shown as header sub-section */
        .context-display {
            display: none;
            padding: var(--space-2) var(--space-4);
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            transition: background-color 0.15s ease;
            align-items: flex-start;
            gap: 6px;
        }

        .context-display:hover {
            background-color: var(--ghost-hover-bg);
        }

        .context-display.visible {
            display: flex;
        }

        .context-display p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
            line-height: 1.4;
            flex: 1;
            cursor: pointer;
        }

        .context-remove-btn {
            flex-shrink: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: all 0.15s ease;
            margin-top: 1px;
        }

        .context-remove-btn:hover {
            opacity: 1;
            color: var(--danger);
            background-color: var(--danger-bg);
        }

        /* URL group headers */
        .url-group-header {
            font-size: 0.7rem;
            font-weight: 600;
            font-family: var(--font-mono, monospace);
            color: var(--text-muted);
            padding: var(--space-2) 0;
            margin-top: var(--space-2);
            border-bottom: 1px solid var(--border);
        }

        .url-group-header:first-child {
            margin-top: 0;
        }

        /* Toast override for sidepanel context */
        #toast {
            width: fit-content;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <header>
        <h2>Annotations</h2>
        <div class="header-actions">
            <button id="networkCaptureBtn" title="Toggle Network Capture (Alt+N)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
            <button id="contextBtn" title="Initial Context">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                    <path d="m15 5 4 4" />
                </svg>
            </button>
            <button id="toggleInspectBtn" title="Toggle Inspect Mode">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="22" x2="18" y1="12" y2="12" />
                    <line x1="6" x2="2" y1="12" y2="12" />
                    <line x1="12" x2="12" y1="6" y2="2" />
                    <line x1="12" x2="12" y1="22" y2="18" />
                </svg>
            </button>
            <button id="closePanelBtn" title="Close Side Panel">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
    </header>

    <div id="contextDisplay" class="context-display">
        <p id="contextText" title="Click to edit context"></p>
        <button id="contextRemoveBtn" class="context-remove-btn" title="Remove context">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
    </div>

    <div id="contextArea" class="context-area">
        <textarea id="contextInput" placeholder="Describe the general context for your annotations..." spellcheck="false"></textarea>
        <div class="context-edit-actions">
            <button id="contextSaveBtn">Set</button>
        </div>
    </div>

    <div id="annotationList">
        <!-- JS injects cards here -->
    </div>

    <footer>
        <button id="exportBtn" class="btn btn-primary">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
            </svg>
            Copy Prompt
        </button>
        <button id="clearBtn" class="btn btn-ghost hover:bg-red-50 hover:text-red-600" style="color: var(--danger);">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M3 6h18" />
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" x2="10" y1="11" y2="17" />
                <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
            Clear All Annotations
        </button>
    </footer>

    <div id="toast" class="toast">Copy successful</div>
    <script src="sidepanel.js"></script>
</body>

</html>
