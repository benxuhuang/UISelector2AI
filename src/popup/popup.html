<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UISelector2AI</title>
  <link rel="stylesheet" href="../ui.css">
  <style>
    body {
      width: 280px;
      height: auto;
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      border-bottom: 1px solid var(--border);
      padding-bottom: var(--space-3);
    }

    h1 {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }

    main {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    /* Override dynamic status style */
    #status-container {
      font-size: 0.75rem;
      display: none;
    }
  </style>
</head>

<body>
  <header>
    <img src="../../icons/icon48.png" alt="Logo" class="logo-icon">
    <h1>UISelector2AI</h1>
  </header>

  <main>
    <button id="toggleInspect" class="btn btn-primary">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" />
        <line x1="22" x2="18" y1="12" y2="12" />
        <line x1="6" x2="2" y1="12" y2="12" />
        <line x1="12" x2="12" y1="6" y2="2" />
        <line x1="12" x2="12" y1="22" y2="18" />
      </svg>
      <span id="inspectText">Start Inspect</span> <span class="text-xs opacity-70 ml-auto" data-shortcut="toggle_inspect">(Alt+O)</span>
    </button>

    <button id="openSidePanel" class="btn btn-secondary">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
        <line x1="15" x2="15" y1="3" y2="21" />
      </svg>
      Toggle Side Panel <span class="text-xs opacity-70 ml-auto" data-shortcut="open_side_panel">(Alt+L)</span>
    </button>

    <button id="networkCapture" class="btn btn-secondary">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span id="networkText">Network Capture</span> <span class="text-xs opacity-70 ml-auto" data-shortcut="network_capture">(Alt+N)</span>
    </button>

    <button id="copyPrompt" class="btn btn-secondary">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
      </svg>
      Copy Prompt <span class="text-xs opacity-70 ml-auto" data-shortcut="copy_prompt">(Alt+C)</span>
    </button>

    <button id="clearAnnotations" class="btn btn-outline-danger">
      <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M3 6h18" />
        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
        <line x1="10" x2="10" y1="11" y2="17" />
        <line x1="14" x2="14" y1="11" y2="17" />
      </svg>
      Clear All Annotations <span class="text-xs opacity-70 ml-auto" data-shortcut="clear_annotations">(Alt+X)</span>
    </button>
  </main>

  <div id="status-container"></div>

  <script src="popup.js"></script>
</body>

</html>
